<!--
  过滤器测试用例
  对应 docs/07-filters.md
  测试: 内置过滤器、类型转换过滤器、原型链过滤器、数组过滤器 ||、自定义过滤器
-->
<div id="filter-test">
  <!-- 基本文本过滤器测试 -->
  <div class="text-block">Hello World Temme</div>

  <!-- 数字转换测试 -->
  <div class="score-board">
    <span class="score" data-max="100">85</span>
    <span class="score" data-max="100">92</span>
    <span class="score" data-max="100">78</span>
  </div>

  <!-- 数组过滤器 || 测试 -->
  <div class="numbers">1 22 333 4444</div>

  <!-- 链式过滤器测试 -->
  <div class="raw-text">  hello temme world  </div>

  <!-- 结构操作过滤器测试 -->
  <div class="tag-list">
    <span class="tag">JavaScript</span>
    <span class="tag">TypeScript</span>
    <span class="tag">React</span>
    <span class="tag">Node.js</span>
  </div>

  <!-- first/last 过滤器测试 -->
  <ul class="ranking">
    <li class="rank-item">第一名</li>
    <li class="rank-item">第二名</li>
    <li class="rank-item">第三名</li>
  </ul>
</div>
