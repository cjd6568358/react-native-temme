<!--
  修饰符测试用例
  对应 docs/08-modifiers.md
  测试: !add、!forceAdd、!array、!candidate、!spread
-->
<div id="modifier-test">
  <!-- !add 测试（默认修饰符） -->
  <div class="post">
    <h2 class="title">temme 使用指南</h2>
    <span class="author">张三</span>
  </div>

  <!-- !forceAdd 测试 - 即使值为 null 也会写入 -->
  <div class="user-card">
    <span class="username">lisi</span>
    <!-- 没有 email 元素，测试 forceAdd -->
  </div>

  <!-- !array 测试 - 将值收集到数组中 -->
  <div class="tag-section">
    <span class="tag">前端</span>
    <span class="tag">后端</span>
    <span class="tag">全栈</span>
    <span class="tag">DevOps</span>
  </div>

  <!-- !candidate 测试 - 只在已有值为假时写入 -->
  <div class="status-board">
    <div class="status-item">
      <span class="label">服务器A</span>
      <span class="status">在线</span>
    </div>
    <div class="status-item">
      <span class="label">服务器B</span>
      <!-- 没有 status 元素 -->
    </div>
  </div>

  <!-- !spread 测试 - 将子选择器结果合并到上层 -->
  <div class="spread-test">
    <div class="card" data-id="1">
      <span class="card-title">卡片一</span>
      <span class="card-desc">描述一</span>
    </div>
    <div class="card" data-id="2">
      <span class="card-title">卡片二</span>
      <span class="card-desc">描述二</span>
    </div>
  </div>
</div>
